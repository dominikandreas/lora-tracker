; LoRa Tracker firmware builds.
; Sources intentionally live in this directory, rather than src/, to preserve
; the shipped Arduino sketch and its adjacent versioned headers.

[platformio]
src_dir = .
; Keep generated sources outside src_dir.  This project intentionally keeps the
; Arduino sketch at its historical top level.
build_dir = ../.pio-build/tracker-firmware

[env]
platform = espressif32 @ 6.7.0
framework = arduino
monitor_speed = 115200
lib_ldf_mode = chain+

[env:heltec_wifi_lora_32_v2]
board = heltec_wifi_lora_32_V2
build_flags =
  -D BOARD_HELTEC_V2
lib_deps =
  sandeepmistry/LoRa @ 0.8.0
  mikalhart/TinyGPSPlus @ 1.0.3
  olikraus/U8g2 @ 2.34.22

[env:heltec_wireless_tracker]
board = esp32-s3-devkitc-1
build_flags =
  -D BOARD_WIRELESS_TRACKER
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D USER_SETUP_LOADED=1
  -D ST7735_DRIVER=1
  -D ST7735_GREENTAB160x80=1
  -D TFT_RGB_ORDER=TFT_BGR
  -D TFT_MISO=-1
  -D TFT_MOSI=42
  -D TFT_SCLK=41
  -D TFT_CS=38
  -D TFT_DC=40
  -D TFT_RST=39
  -D TFT_BL=21
  -D TFT_BACKLIGHT_ON=1
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D SPI_FREQUENCY=27000000
  -D USE_HSPI_PORT
lib_deps =
  jgromes/RadioLib @ 6.6.0
  mikalhart/TinyGPSPlus @ 1.0.3
  bodmer/TFT_eSPI @ 2.5.43
