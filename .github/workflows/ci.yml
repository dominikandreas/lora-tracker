name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: components/archiver/pyproject.toml
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          package-manager-cache: false
      - name: Install build dependencies
        run: python -m pip install --disable-pip-version-check platformio==6.1.18 "./components/archiver[test]"
      - name: Create generic release configuration
        run: |
          cp components/tracker-firmware/secrets.example.h components/tracker-firmware/secrets.h
          cp components/gateway-firmware/secrets.example.h components/gateway-firmware/secrets.h
      - name: Test archiver and embedded contracts
        working-directory: components/archiver
        run: python -m pytest -q
      - name: Install WebAssembly compiler
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y emscripten
      - name: Test simulation engine
        working-directory: components/simulation-engine
        run: |
          npm ci
          npm test
      - name: Test simulator-web
        working-directory: components/simulator-web
        run: |
          npm ci
          npm run build
          git diff --exit-code ../simulation-engine/dist/ || (echo "Simulation engine drift detected. Update the repository." && exit 1)
          npx playwright install --with-deps chromium
          npm run test:browser
      - name: Test browser application
        working-directory: components/web-app
        run: |
          npm ci
          npm run build
          npx playwright install --with-deps chromium
          npm test
          npm run package
      - name: Upload Network Lab artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lora-tracker-network-lab
          path: components/simulator-web/app/
          if-no-files-found: error
      - name: Upload PWA artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lora-tracker-web-app
          path: components/web-app/dist/
          if-no-files-found: error
      - name: Build tracker firmware
        run: |
          pio run -d components/tracker-firmware -e heltec_wifi_lora_32_v2
          pio run -d components/tracker-firmware -e heltec_wireless_tracker
      - name: Build gateway firmware
        run: pio run -d components/gateway-firmware -e heltec_wifi_lora_32_v2
      - name: Build repeater firmware
        run: |
          pio run -d components/repeater-firmware -e heltec_wifi_lora_32_v2
          pio run -d components/repeater-firmware -e heltec_wireless_tracker
